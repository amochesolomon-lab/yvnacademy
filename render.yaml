services:
  - type: web
    name: yvn-academy
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: yvn-academy-db
          property: connectionString

databases:
  - name: yvn-academy-db
    plan: free