{% extends "base.html" %}

{% block content %}

<div class="admin-page">

  <div class="admin-header">
    <div class="admin-header-inner">
      <div>
        <p class="admin-label">Admin Panel</p>
        <h1 class="admin-title">Add New Course</h1>
        <p class="admin-sub">Fill in the details below to publish a new course</p>
      </div>
      <a href="/admin/courses" class="admin-action-btn">← Back to Courses</a>
    </div>
  </div>

  <div class="add-course-wrap">
    <div class="add-course-card">

      <form method="POST" enctype="multipart/form-data" class="add-course-form" id="courseForm">

        <div class="form-group">
          <label>Course Title</label>
          <input type="text" name="title" placeholder="e.g. Master Graphic Design" required>
        </div>

        <div class="form-group">
          <label>Instructor Name</label>
          <input type="text" name="instructor" placeholder="e.g. John Doe" required>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea name="description" rows="4" placeholder="Describe what students will learn..." required></textarea>
        </div>

        <!-- Course Type Selector -->
        <div class="form-group">
          <label>Course Type</label>
          <div class="course-type-toggle">
            <label class="type-option active" id="videoLabel">
              <input type="radio" name="course_type" value="video" checked onchange="toggleCourseType()">
              <span class="type-icon">▶</span>
              <span class="type-text">
                <strong>Video Course</strong>
                <small>Link to Telegram channel</small>
              </span>
            </label>
            <label class="type-option" id="pdfLabel">
              <input type="radio" name="course_type" value="pdf" onchange="toggleCourseType()">
              <span class="type-icon">&#128196;</span>
              <span class="type-text">
                <strong>PDF Course</strong>
                <small>Upload a PDF file directly</small>
              </span>
            </label>
          </div>
        </div>

        <!-- Video fields -->
        <div id="videoFields">
          <div class="form-group">
            <label>Telegram Course Link</label>
            <input type="text" name="telegram_link" placeholder="https://t.me/...">
          </div>
        </div>

        <!-- PDF fields -->
        <div id="pdfFields" style="display:none;">
          <div class="form-group">
            <label>Upload PDF File</label>
            <input type="file" name="pdf_file" accept=".pdf">
            <p class="form-hint">Max file size: 50MB. Students can read and download after approval.</p>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Course Thumbnail</label>
            <input type="file" name="thumbnail" accept="image/*">
          </div>
          <div class="form-group">
            <label>Price (&#8358;)</label>
            <input type="number" name="price" placeholder="0" required>
          </div>
        </div>

        <button type="submit" class="add-course-submit">Publish Course</button>

      </form>

    </div>
  </div>

</div>

<script>
function toggleCourseType() {
  const isVideo = document.querySelector('input[name="course_type"]:checked').value === 'video';
  document.getElementById('videoFields').style.display = isVideo ? 'block' : 'none';
  document.getElementById('pdfFields').style.display   = isVideo ? 'none' : 'block';
  document.getElementById('videoLabel').classList.toggle('active', isVideo);
  document.getElementById('pdfLabel').classList.toggle('active', !isVideo);
}
</script>

{% endblock %}
